<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none">
  <!-- Outer frame -->
  <rect x="40" y="60" width="1120" height="780" rx="56" fill="#F3F4F6"/>
  <!-- Inner cutout (same color as page background, so screenshot shows beneath) -->
  <rect x="120" y="200" width="960" height="560" rx="44" fill="transparent"/>

  <!-- Window top bar -->
  <rect x="120" y="120" width="960" height="92" rx="32" fill="#E5E7EB"/>

  <!-- Dots -->
  <circle cx="240" cy="166" r="22" fill="#6B7280"/>
  <circle cx="330" cy="166" r="22" fill="#6B7280"/>
  <circle cx="420" cy="166" r="22" fill="#6B7280"/>

  <!-- Inner border hint -->
  <rect x="120" y="200" width="960" height="560" rx="44" stroke="#D1D5DB" stroke-width="10"/>
</svg>
